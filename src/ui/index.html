<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Digital | Infant Registry</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="login-section" class="login-page">
        <div class="card" style="max-width: 400px; width: 90%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="color: var(--primary); margin: 0;">GS Digital</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Sistema Interno de Registro</p>
            </div>
            
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ej: GGJJ">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <button class="btn btn-primary" onclick="handleLogin()" style="width: 100%; margin-top: 1rem;">
                Entrar al Sistema
            </button>
            <div id="login-error" class="error-msg" style="display: none; color: #ef4444; font-size: 0.8rem; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>

    <div id="dashboard-section" class="app-container" style="display: none;">
        <nav class="navbar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.5rem;">👶</span>
                <strong style="font-size: 1.2rem; letter-spacing: -0.5px;">GS DIGITAL <span style="font-weight: 400; color: var(--text-muted);">| Registry</span></strong>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="user-display" style="font-weight: 600; color: var(--primary);"></span>
                <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="charts-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="card">
                    <canvas id="graficaGeneros"></canvas>
                </div>
                <div class="card">
                    <canvas id="graficaSangre"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    📝 Nuevo Registro de Infante
                </h3>
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div class="form-group">
                        <label>Nombre del Infante</label>
                        <input type="text" id="infant_name" placeholder="Nombre completo">
                    </div>
                    <div class="form-group">
                        <label>Género</label>
                        <select id="gender">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" id="birth_date">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Sangre</label>
                        <select id="blood_type">
                            <option value="O+">O Rh+</option>
                            <option value="O-">O Rh-</option>
                            <option value="A+">A Rh+</option>
                            <option value="A-">A Rh-</option>
                            <option value="B+">B Rh+</option>
                            <option value="AB+">AB Rh+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nombre del Padre</label>
                        <input type="text" id="father_name">
                    </div>
                    <div class="form-group">
                        <label>Nombre de la Madre</label>
                        <input type="text" id="mother_name">
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" step="0.01" id="weight">
                    </div>
                    <div class="form-group">
                        <label>Talla (cm)</label>
                        <input type="number" step="0.1" id="size">
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                    <button class="btn btn-primary" onclick="saveData()">
                        🚀 Registrar en Blockchain Local
                    </button>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden; margin-top: 20px;">
                <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0;">📋 Registros Actuales</h3>
                    <button class="btn" style="background: #f1f5f9; color: #1e293b;" onclick="loadTable()">🔄 Actualizar</button>
                </div>
                <div class="table-container" style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #f8fafc; text-align: left;">
                                <th style="padding: 12px; border-bottom: 1px solid var(--border);">Nombre</th>
                                <th style="padding: 12px; border-bottom: 1px solid var(--border);">Edad Exacta</th>
                                <th style="padding: 12px; border-bottom: 1px solid var(--border);">Padres</th>
                                <th style="padding: 12px; border-bottom: 1px solid var(--border);">Salud</th>
                                <th style="padding: 12px; border-bottom: 1px solid var(--border);">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="registry-table">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
