<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Infantes | GS Digital</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
            <nav>
                <div class="logo">👶 Registro de Infantes</div>
                <div id="user-info" class="hidden">
                    <span id="current-user-display"></span>
                    <button onclick="logout()" class="btn-secondary">Cerrar Sesión</button>
                </div>
            </nav>
        </header>

        <main id="app-content">
            <section id="login-section" class="card">
                <h2>Bienvenido</h2>
                <p>Ingresa tus credenciales para acceder al sistema.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" required placeholder="Ej: GGJJ">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Entrar al Sistema</button>
                </form>
                <div id="login-error" class="error-msg"></div>
            </section>

            <section id="dashboard-section" class="hidden">
                <div class="actions-bar">
                    <button id="btn-add-infant" class="btn-success hidden">➕ Registrar Nuevo Infante</button>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Buscar por nombre o inicial...">
                    </div>
                </div>

                <div class="table-container card">
                    <h3>Listado de Infantes</h3>
                    <table id="infants-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Género</th>
                                <th>Edad Exacta</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="infants-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 GS Digital - Arquitectura de Software Vanilla</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
