<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Digital - Registro de Infantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">👶 GS Digital | Registry</div>
            <div id="user-info" class="hidden">
                <span id="current-user-display"></span>
                <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <main id="app-content">
        
        <section id="login-section" class="card">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para acceder al sistema.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: GGJJ" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Entrar al Sistema</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </section>

        <section id="dashboard-section" class="hidden w-full">
            <div class="dashboard-header">
                <h2>Listado de Infantes</h2>
                <button id="btn-add-infant" class="btn-success hidden" onclick="showRegisterForm()">
                    + Registrar Nuevo Infante
                </button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar por nombre o inicial..." oninput="filterInfants()">
            </div>

            <div class="table-container">
                <table id="infants-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Género</th>
                            <th>Edad Exacta</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="infants-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="register-infant-section" class="hidden card form-wide">
            <h3>📝 Nuevo Registro de Infante</h3>
            <form id="infant-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre del Infante</label>
                        <input type="text" id="infant_name" required>
                    </div>
                    <div class="form-group">
                        <label>Género</label>
                        <select id="gender">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nombre del Padre</label>
                        <input type="text" id="father_name">
                    </div>
                    <div class="form-group">
                        <label>Nombre de la Madre</label>
                        <input type="text" id="mother_name">
                    </div>
                    <div class="form-group">
                        <label>Tipo Sangre (Infante)</label>
                        <input type="text" id="blood_i" placeholder="Ej: O+">
                    </div>
                    <div class="form-group">
                        <label>Fecha y Hora de Nacimiento</label>
                        <input type="datetime-local" id="birth_date" required>
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" step="0.1" id="weight">
                    </div>
                    <div class="form-group">
                        <label>Talla (cm)</label>
                        <input type="number" step="0.1" id="size">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Registro</button>
                    <button type="button" onclick="hideRegisterForm()" class="btn-secondary">Cancelar</button>
                </div>
            </form>
        </section>

    </main>

    <footer>
        &copy; 2026 GS Digital - Arquitectura de Software Vanilla
    </footer>

    <script src="script.js"></script>
</body>
</html>
